<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Кот Учёный — v15</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#3B82F6">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%233B82F6'/><text x='50' y='70' font-size='60' text-anchor='middle'>🐱</text></svg>">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐱</text></svg>">
    <link rel="stylesheet" href="css/styles.css?v=2">
    
</head>
<body>
    <div class="app" id="app">
        <div class="header math-header" id="headerBar">
            <div class="header-top">
                <div class="header-left">
                    <div class="cat-avatar" id="catAvatar">🐱</div>
                    <div class="header-app-name">Кот Учёный</div>
                </div>
                <div class="header-stats">
                    <div class="stat"><span>🔥</span><span id="streakCount">7</span></div>
                    <div class="stat"><span>💎</span><span id="gemCount">245</span></div>
                </div>
            </div>
            <div class="subject-switch">
                <button class="subject-btn active" id="btnMath"><span>🧮</span>Математика</button>
                <button class="subject-btn" id="btnRus"><span>📝</span>Русский</button>
            </div>
        </div>

        <div class="cat-stage math-stage" id="catStage">
            <div class="cat-speech-bubble" id="catSpeech">Мур! Всё работает!</div>
            <div class="cat-emoji" id="catBody">🐱</div>
        </div>

        <div class="main-content">
            <div class="section-title"><span>🌳</span>Дерево навыков</div>
            <div id="skillTree"></div>
        </div>

        <div class="bottom-nav">
            <button class="nav-btn active" id="navHome"><span class="nav-icon">🏠</span>Главная</button>
            <button class="nav-btn" id="navStories"><span class="nav-icon">📖</span>Истории</button>
            <button class="nav-btn" id="navTraps" style="position:relative;">
                <span class="nav-icon">🪤</span>Ловушки
                <span class="nav-badge" id="trapsBadge" style="display:none;">0</span>
            </button>
            <button class="nav-btn" id="navProfile"><span class="nav-icon">👤</span>Профиль</button>
        </div>

        <!-- ПАНЕЛИ ВНУТРИ APP -->
        <div class="panel-overlay" id="storyPanel">
            <div class="panel-card">
                <div class="panel-title">📖 Истории</div>
                <div class="panel-subtitle" id="storyPanelSubtitle"></div>
                <div id="storyList"></div>
                <button class="panel-close" id="btnStoryPanelClose">Закрыть</button>
            </div>
        </div>
        <div class="panel-overlay" id="trapsPanel">
            <div class="panel-card">
                <div class="panel-title">🪤 Ловушки</div>
                <div class="panel-subtitle" id="trapsSubtitle"></div>
                <div id="trapsList"></div>
                <button class="panel-close" id="btnTrapsPanelClose">Закрыть</button>
            </div>
        </div>
        <div class="panel-overlay" id="profilePanel">
            <div class="panel-card">
                <div id="profileContent"></div>
                <button class="panel-close" id="btnProfilePanelClose">Закрыть</button>
            </div>
        </div>
        <div class="panel-overlay" id="trapQuizOverlay">
            <div class="panel-card" id="trapQuizCard"></div>
        </div>
    </div>

    <!-- ТОСТЫ И УРОКИ (ПОВЕРХ ВСЕГО) -->
    <div class="toast" id="toast"></div>
    <div class="achievement-toast" id="achToast">
        <span style="font-size:24px;">🏆</span><span id="achToastText"></span>
    </div>

    <div class="lesson-overlay" id="lessonOverlay">
        <div class="lesson-container math-lesson" id="lessonContainer">
            <div class="lesson-progress-wrapper" id="lessonProgressWrapper">
                <div class="lesson-progress-bar" id="lessonProgressBar"></div>
            </div>
            <div class="lesson-header math-bar" id="lessonHeader">
                <span class="lesson-title" id="lessonTitle">📚</span>
                <div style="display:flex;align-items:center;gap:8px;">
                    <div class="lesson-steps" id="lessonSteps"></div>
                    <button class="lesson-close" id="lessonCloseBtn">✕</button>
                </div>
            </div>
            <div class="lesson-scene" id="lessonScene"></div>
            <button class="lesson-next math-next" id="lessonNextBtn">Далее ▸</button>
            <div class="lesson-finish" id="lessonFinishBlock">
                <div class="finish-emoji">🎉</div>
                <div class="finish-title" id="lfinishTitle">Урок пройден!</div>
                <div class="finish-xp" id="lfinishXP"></div>
                <div class="finish-subtitle" id="lfinishSubtitle"></div>
                <div class="finish-stats">
                    <div class="finish-stat">
                        <div class="finish-stat-val" style="color:var(--green);" id="lfinishCorrect">0</div>
                        <div class="finish-stat-label">Верно</div>
                    </div>
                    <div class="finish-stat">
                        <div class="finish-stat-val" style="color:var(--red);" id="lfinishWrong">0</div>
                        <div class="finish-stat-label">Ошибок</div>
                    </div>
                </div>
                <button class="btn-lesson-finish math-finish" id="btnLessonFinish">Завершить</button>
            </div>
        </div>
    </div>

    <div class="story-overlay" id="storyOverlay">
        <div class="story-container math-story" id="storyContainer">
            <div class="story-header-bar math-bar" id="storyHeaderBar">
                <span class="story-title-header" id="storyTitleHeader">🕵️</span>
                <div style="display:flex;align-items:center;gap:6px;">
                    <div class="story-steps" id="storySteps"></div>
                    <button class="story-close-btn" id="storyCloseBtn">✕</button>
                </div>
            </div>
            <div class="story-scene" id="storyScene"></div>
            <button class="story-next-btn math-next" id="storyNextBtn">Далее ▸</button>
            <div class="story-finish" id="storyFinishBlock2">
                <div class="finish-emoji">🏆</div>
                <div class="finish-title" id="finishTitle"></div>
                <div class="finish-xp" id="finishXP"></div>
                <div class="finish-subtitle" id="finishSubtitle"></div>
                <button class="btn-finish-story math-finish" id="btnFinishStory">Завершить</button>
            </div>
        </div>
    </div>

    <div class="tutorial-overlay" id="tutorialOverlay">
    <div class="tutorial-card">
        <div class="tutorial-emoji" id="tutEmoji">🐱</div>
        <div class="tutorial-title" id="tutTitle"></div>
        <div class="tutorial-text" id="tutText"></div>
        <div class="tutorial-dots" id="tutDots"></div>
        <button class="tutorial-btn" id="tutNext">Далее</button>
        <button class="tutorial-skip" id="tutSkip">Пропустить</button>
    </div>
</div>

    <script type="module" src="js/app.js?v=2"></script>
    <script>
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
    </script>
</body>
</html>
